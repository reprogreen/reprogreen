<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consultar Estado - REPROGREEN</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:#eef3f8 url("img/fondo.png") no-repeat top center;
    background-size:cover;
    background-attachment:fixed;

    min-height:100vh;

    display:flex;
    flex-direction:column;

    color:#333;

}

/*==========================
CONTENEDOR
==========================*/

.container{

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    max-width:700px;

    margin:0 auto;

    padding:30px;

}

/*==========================
TARJETA
==========================*/

.tarjeta{

    width:100%;

    background:#fff;

    border-radius:20px;

    border-top:6px solid #1E7D32;

    padding:28px 30px;

    box-shadow:0 15px 35px rgba(0,0,0,.10);

}

.tarjeta h2{

    color:#1E7D32;

    font-size:30px;

    margin-bottom:15px;

}

.tarjeta p{

    color:#666;

    margin-bottom:25px;

    line-height:1.5;

}

/*==========================
INFO
==========================*/

.info{

    background:#edf8f0;

    border-left:6px solid #1E7D32;

    color:#176728;

    padding:18px;

    border-radius:12px;

    margin-bottom:28px;

}

/*==========================
FORMULARIO
==========================*/

label{

    display:block;

    font-weight:bold;

    margin:15px 0 8px;

}

input{

    width:100%;

    padding:12px 15px;

    border:1px solid #d8d8d8;

    border-radius:12px;

    font-size:16px;

}

input:focus{

    outline:none;

    border-color:#1E7D32;

    box-shadow:0 0 0 4px rgba(30,125,50,.15);

}

button{

    width:100%;

    margin-top:22px;

    padding:14px;

    background:#1E7D32;

    color:#fff;

    border:none;

    border-radius:12px;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

}

button:hover{

    background:#176728;

}

/*==========================
FOOTER
==========================*/

footer{

    background:#1E6F3D;

    color:white;

    text-align:center;

    padding:18px 10px;

    margin-top:auto;

}

.footer-line{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    margin:8px 0;

}

.footer-line span{

    width:70px;

    height:1px;

    background:rgba(255,255,255,.35);

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:768px){

body{

    background:#eef3f8 url("img/fondo-mobile.png") no-repeat top center;

    background-size:100% auto;

    background-attachment:scroll;

}

.container{

    margin-top:10px;

    padding:0 15px 20px;

}

.tarjeta{

    padding:22px;

}

.tarjeta h2{

    font-size:24px;

}

button{

    font-size:16px;

}

}

</style>

</head>

<body>

<div class="container">

    <div class="tarjeta">

        <h2>Consultar Estado</h2>

        <p>
            Ingrese el número de trámite para conocer el estado actual de su solicitud.
        </p>

        <div class="info">

            <strong>Estado:</strong><br>

            Consulte el estado actual de su trámite.

        </div>

        <label for="tramite">

            Número de trámite

        </label>

        <input
            type="text"
            id="tramite"
            placeholder="Ej: REPRO-12345">

        <button onclick="consultar()">

            Consultar Estado

        </button>

    </div>

</div>

<script>

function consultar(){

    let tramite = document.getElementById("tramite").value.trim();

    if(tramite===""){

        alert("⚠️ Debe ingresar un número de trámite.");

        return;

    }

    alert(
        "❌ No se encontró ningún trámite con ese número.\n\n" +
        "Verifique el número ingresado e intente nuevamente."
    );

}

</script>

<footer>

    <div class="footer-content">

          <p>Portal de Gestión REPROCANN</p>

        <div class="footer-line">
            <span></span>
            🌿
            <span></span>
        </div>

        <small>
            © 2026 REPROGREEN - Todos los derechos reservados.
        </small>

    </div>

</footer>

</body>

</html>
