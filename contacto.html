<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto - REPROGREEN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

/*==========================
BODY
==========================*/

html{
    height:100%;
}

body{

    background:#eef3f8 url("img/fondo.png") no-repeat top center;

    background-size:cover;

    min-height: 100vh;

    display: flex;

    flex-direction: column;

    background-position:top center;

    background-attachment:scroll;

}

/*==========================
CONTENEDOR
==========================*/

.container{
    width:100%;
    max-width:620px;
    margin:200px auto 0px;
    padding:0;
}

.container{

    flex:1;

}

/*==========================
TARJETA
==========================*/

.tarjeta{
    width:100%;
    max-width:620px;
    margin:0 auto;

    background:#fff;
    border-radius:20px;
    border-top:6px solid #1E7D32;

    padding:28px 30px;

    box-shadow:0 15px 35px rgba(0,0,0,.10);
}

.tarjeta h2{

    color:#1E7D32;

    font-size:30px;

    margin-bottom:30px;

}

/*==========================
ESTADO
==========================*/

.info{

    background:#edf8f0;

    border-left:6px solid #1E7D32;

    color:#176728;

    padding:18px;

    border-radius:12px;

    margin-bottom:28px;

    line-height:1.6;

}

/*==========================
FORMULARIO
==========================*/

label{

    display:block;

    font-weight:bold;

    margin:12px 0 5px;

    color:#444;

}

input{

    width:100%;

    padding:12px 15px;

    border:1px solid #d8d8d8;

    border-radius:12px;

    font-size:16px;

    transition:.25s;

    background:white;

}

input:focus{

    outline:none;

    border-color:#1E7D32;

    box-shadow:0 0 0 4px rgba(30,125,50,.15);

}

textarea{
    width:100%;
    min-height:140px;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    resize:vertical;
    box-sizing:border-box;
}

/*==========================
BOTONES
==========================*/

button{

    width:100%;

    background:#1E7D32;

    color:white;

    border:none;

    border-radius:12px;

    padding:14px;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

    margin-top:18px;

    box-shadow:0 8px 18px rgba(30,125,50,.20);

}

button:hover{

    background:#176728;

    transform:translateY(-2px);

}

/*==========================
FOOTER
==========================*/

footer{
    width:100%;
    background:#1E6F3D;
    color:#fff;

    text-align:center;

    padding:18px 10px;

    margin-top:auto;
}

.footer-content{

    max-width:1200px;

    margin:0 auto;

}

.footer-line{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin:8px 0;
}

.footer-line span{
    width:70px;
    height:1px;
    background:rgba(255,255,255,.35);
}

/*==========================
RESPONSIVE
==========================*/

@media (max-width:2100px){

html {
  min-height: 100%;
  background:#eef3f8 url("img/fondo-mobile.png") no-repeat top center;
  background-repeat: no-repeat;
  background-position: top center;
  background-attachment: scroll; 
  background-size: 100% auto; /* Esto hace que cubra toda la pantalla siempre */
}

body {
  min-height: 100dvh; /* Ocupa 100% de la altura del celu, se adapta a la barra */
  margin: 0;
  background: transparent; /* Para que se vea la img del html de atrás */
  display: flex;
  flex-direction: column;
}

/* Para que el footer verde quede siempre abajo */
main, .contenido {
  flex: 1;
}
footer {
  margin-top: auto;
}

.container{

    padding:0 15px 20px;
    width:100%;
    margin:100px auto 0;
    max-width:620px;

}

.logo{

    max-width:340px;

}

.tarjeta{

    padding:22px;
    border-radius:18px;
    margin-top:0;

}

.tarjeta h2{

    font-size:24px;

}

.progreso{

    transform:scale(.90);
    margin:10px auto 8px;

}

.linea{

    width:45px;

}

button{

    font-size:16px;

}
}

@media (max-width:768px){

html {
  min-height: 100%;
  background:#eef3f8 url("img/fondo-mobile.png") no-repeat top center;
  background-repeat: no-repeat;
  background-position: top center;
  background-attachment: scroll; 
  background-size: 100% auto; /* Esto hace que cubra toda la pantalla siempre */
}

body {
  min-height: 100dvh; /* Ocupa 100% de la altura del celu, se adapta a la barra */
  margin: 0;
  background: transparent; /* Para que se vea la img del html de atrás */
  display: flex;
  flex-direction: column;
}

/* Para que el footer verde quede siempre abajo */
main, .contenido {
  flex: 1;
}
footer {
  margin-top: auto;
}

.container{

    padding:0 15px 20px;
    width:100%;
    margin:100px auto 0;
    max-width:620px;

}

.logo{

    max-width:340px;

}

.tarjeta{

    padding:22px;
    border-radius:18px;
    margin-top:0;

}

.tarjeta h2{

    font-size:24px;

}

.progreso{

    transform:scale(.90);
    margin:10px auto 8px;

}

.linea{

    width:45px;

}

button{

    font-size:16px;

}
}

</style>

</head>

<body>

</div>

<div class="container">

    <div class="tarjeta">

        <h2>Contacto</h2>
        
    <div class="info">
    <strong>Estado:</strong> Complete el formulario y nuestro equipo responderá a la brevedad.
</div>

<label>Nombre y Apellido</label>
<input type="text" id="nombre">

<label>Correo electrónico</label>
<input type="email" id="email">

<label>Asunto</label>
<input type="text" id="asunto">

<label>Mensaje</label>
<textarea id="mensaje" rows="6"></textarea>

<button onclick="enviarMensaje()">
    Enviar Mensaje
</button>

    </div>

</div>

<script>

function enviarMensaje(){

    let nombre = document.getElementById("nombre").value.trim();
    let email = document.getElementById("email").value.trim();
    let asunto = document.getElementById("asunto").value.trim();
    let mensaje = document.getElementById("mensaje").value.trim();

    if(nombre=="" || email=="" || asunto=="" || mensaje==""){
        alert("⚠ Debe completar todos los campos.");
        return;
    }

    const numero = "REPRO-" + Math.floor(10000 + Math.random() * 90000);

    localStorage.setItem("tramiteMensaje", numero);

    window.location.href = "mensaje.html";

}

</script>

<footer>

    <div class="footer-content">

        <p>Portal de Gestión REPROCANN</p>

        <div class="footer-line">
            <span></span>
            🌿
            <span></span>
        </div>

        <small>
            © 2026 REPROGREEN - Todos los derechos reservados.
        </small>

    </div>

</footer>

</body>
</html>
