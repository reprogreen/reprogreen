<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensaje enviado correctamente</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    font-family:Arial,sans-serif;

    background:#eef3f8 url("img/fondo.png") no-repeat top center;
    background-size:cover;
    background-attachment:fixed;

    min-height:100vh;

    display:flex;
    flex-direction:column;
}

.contenedor{
    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    max-width:700px;

    margin:0 auto;

    padding:30px;
}

footer{
    background:#1E6F3D;
    color:white;

    text-align:center;

    padding:18px 10px;

    margin-top:auto;
}

.footer-line{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin:8px 0;
}

.footer-line span{
    width:70px;
    height:1px;
    background:rgba(255,255,255,.35);
}

.tarjeta{

    width:100%;

    background:#fff;

    border-radius:20px;

    border-top:6px solid #1E6F3D;

    padding:40px;

    box-shadow:0 8px 25px rgba(0,0,0,.10);

}

h2{

    color:#1E6F3D;

    font-size:34px;

    margin-bottom:15px;

}

.descripcion{

    color:#666;

    font-size:18px;

    margin-bottom:30px;

}

.numero{

    background:#eef9f1;

    border:2px dashed #1E6F3D;

    border-radius:12px;

    padding:18px;

    font-size:34px;

    font-weight:bold;

    color:#1E6F3D;

    margin-bottom:35px;

}

button{

    width:100%;

    margin-top:30px;

    padding:16px;

    background:#1E6F3D;

    color:white;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#17592f;

}

@media(max-width:768px){

.tarjeta{

    padding:25px;

}

h2{

    font-size:28px;

}

.numero{

    font-size:26px;

}

}

</style>

</head>

<body>

<div class="contenedor">

<div class="tarjeta">

<h2>
Mensaje enviado correctamente
</h2>

<p class="descripcion">
Nuestro equipo se pondrá en contacto a la brevedad.
</p>

<div class="numero" id="numero"></div>

<button onclick="window.location='index.html'">

Volver al inicio

</button>

</div>

</div>

<script>

const numero = localStorage.getItem("tramiteMensaje");

document.getElementById("numero").textContent =
    numero ? numero : "REPRO-00000";

</script>

<footer>

    <div class="footer-content">

        <p>Portal de Gestión REPROCANN</p>

        <div class="footer-line">
    <span></span>
    🌿
    <span></span>
</div>

        <small>
            © 2026 REPROGREEN - Todos los derechos reservados.
        </small>

    </div>

</footer>

</body>

</html>
